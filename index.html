<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sorry, Lakshmi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

  :root{
    --bg:#F1F0F7;
    --surface:#FFFFFF;
    --ink:#16151F;
    --ink-soft:#6B6880;
    --primary:#5A48F5;
    --primary-dark:#4636D8;
    --pop:#C7F94D;
    --line:#E7E5F0;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }

  body{
    font-family:'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    color:var(--ink);
    min-height:100vh;
    min-height:100dvh;
    display:flex;
    padding:24px;
    overflow-x:hidden;
    overflow-y:auto;
    background:
      radial-gradient(680px 520px at 12% 6%, rgba(90,72,245,0.16), transparent 60%),
      radial-gradient(620px 560px at 88% 94%, rgba(199,249,77,0.22), transparent 60%),
      var(--bg);
    -webkit-font-smoothing:antialiased;
    -webkit-tap-highlight-color:transparent;
  }

  .card{
    position:relative;
    width:100%;
    max-width:460px;
    margin:auto;
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:26px;
    padding:clamp(28px, 6vw, 46px);
    box-shadow:
      0 2px 4px rgba(22,21,31,0.04),
      0 24px 60px -24px rgba(90,72,245,0.30);
    animation:rise .7s cubic-bezier(.16,1,.3,1) both;
    z-index:2;
  }

  @keyframes rise{
    from{ opacity:0; transform:translateY(18px) scale(.98); }
    to{ opacity:1; transform:none; }
  }

  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-size:12px;
    font-weight:700;
    letter-spacing:.16em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:22px;
  }
  .eyebrow::before{
    content:"";
    width:9px; height:9px;
    border-radius:3px;
    background:var(--pop);
    box-shadow:0 0 0 4px rgba(199,249,77,0.28);
  }

  .tile{
    width:62px; height:62px;
    border-radius:18px;
    display:grid;
    place-items:center;
    font-size:32px;
    line-height:1;
    background:linear-gradient(140deg, #6D5CFF 0%, #5A48F5 60%, #4636D8 100%);
    box-shadow:0 12px 22px -8px rgba(90,72,245,0.55);
    margin-bottom:22px;
    transform:rotate(-4deg);
    animation:bob 3.4s ease-in-out infinite;
  }
  @keyframes bob{
    0%,100%{ transform:rotate(-4deg) translateY(0); }
    50%{ transform:rotate(-4deg) translateY(-6px); }
  }

  h1{
    font-family:'Bricolage Grotesque', system-ui, sans-serif;
    font-weight:800;
    font-size:clamp(32px, 8vw, 46px);
    line-height:1.02;
    letter-spacing:-.02em;
    margin-bottom:16px;
  }
  h1 .hl{ color:var(--primary); }

  .msg{
    font-size:clamp(15px, 3.9vw, 17px);
    line-height:1.6;
    color:var(--ink-soft);
    max-width:38ch;
    margin-bottom:26px;
    font-weight:500;
  }

  .question{
    font-size:clamp(18px, 4.6vw, 21px);
    font-weight:700;
    color:var(--ink);
    margin-bottom:24px;
    min-height:1.4em;
  }

  .buttons{
    display:flex;
    gap:12px;
    align-items:center;
    flex-wrap:wrap;
  }

  button{
    font-family:'Plus Jakarta Sans', sans-serif;
    cursor:pointer;
    border:none;
    font-size:16px;
    font-weight:700;
    border-radius:14px;
    transition:transform .16s ease, box-shadow .16s ease, background .16s ease;
  }

  .yes{
    color:#fff;
    padding:16px 26px;
    background:var(--primary);
    box-shadow:0 12px 22px -8px rgba(90,72,245,0.55);
  }
  .yes:hover{ transform:translateY(-2px); background:var(--primary-dark); box-shadow:0 16px 26px -8px rgba(90,72,245,0.6); }
  .yes:active{ transform:translateY(0); }
  .yes:focus-visible{ outline:3px solid rgba(22,21,31,.35); outline-offset:3px; }

  .no{
    color:var(--ink-soft);
    padding:16px 24px;
    background:var(--surface);
    border:1.5px solid var(--line);
  }
  .no.dodging{
    position:fixed;
    z-index:50;
    transition:left .11s ease-out, top .11s ease-out, transform .16s ease;
    margin:0;
  }

  #thanks{ display:none; }
  #thanks.show{ display:block; animation:rise .6s cubic-bezier(.16,1,.3,1) both; }
  #ask.hide{ display:none; }

  .signoff{
    font-size:13px;
    color:var(--ink-soft);
    font-weight:600;
    margin-top:22px;
  }

  .confetti{
    position:fixed;
    top:0; left:0;
    width:11px; height:14px;
    border-radius:3px;
    pointer-events:none;
    z-index:40;
    will-change:transform, opacity;
  }

  @media (prefers-reduced-motion: reduce){
    .card, #thanks.show{ animation:none; }
    .tile{ animation:none; }
    .no.dodging{ transition:none; }
  }
</style>
</head>
<body>
  <main class="card">
    <section id="ask">
      <span class="eyebrow">an apology</span>
      <div class="tile" aria-hidden="true">😅</div>

      <h1>My bad, <span class="hl">Lakshmi</span>.</h1>
      <p class="msg">I know I dropped the ball, and that's on me. You're a good person and I don't want to make u feel bad.</p>
      <p class="question" id="question">So… are we cool?</p>

      <div class="buttons">
        <button class="yes" id="yesBtn">Yeah, we're cool 😄</button>
        <button class="no" id="noBtn" tabindex="-1" aria-hidden="true">Nah</button>
      </div>
    </section>

    <section id="thanks" aria-live="polite">
      <div class="tile" aria-hidden="true">🙌</div>
      <h1>We're <span class="hl">cool</span> again.</h1>
      <p class="msg">Thanks for not making it weird — I owe you one. Good friends &gt; small stuff. 🎉</p>
      <div class="signoff">— your (slightly sorry) friend</div>
    </section>
  </main>

<script>
(function(){
  var noBtn = document.getElementById('noBtn');
  var yesBtn = document.getElementById('yesBtn');
  var question = document.getElementById('question');
  var ask = document.getElementById('ask');
  var thanks = document.getElementById('thanks');
  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var pleas = [
    "C'mon 😭",
    "Don't be like that",
    "I'll make it up to you",
    "That button's broken anyway 😂",
    "You literally can't tap it",
    "Just hit the other one",
    "Pleaseee 🙏"
  ];
  var pIndex = 0;
  var dodged = false;
  var yesScale = 1;

  function rectsOverlap(a, b, pad){
    pad = pad || 0;
    return !(a.right + pad < b.left ||
             a.left - pad > b.right ||
             a.bottom + pad < b.top ||
             a.top - pad > b.bottom);
  }

  function moveNo(){
    if(!dodged){
      dodged = true;
      document.body.appendChild(noBtn);
      noBtn.classList.add('dodging');
    }

    var pad = 12;
    var bw = noBtn.offsetWidth;
    var bh = noBtn.offsetHeight;
    var maxX = Math.max(pad, window.innerWidth  - bw - pad);
    var maxY = Math.max(pad, window.innerHeight - bh - pad);

    var yesRect = yesBtn.getBoundingClientRect();
    var x, y, tries = 0, candidate;
    do{
      x = pad + Math.random() * (maxX - pad);
      y = pad + Math.random() * (maxY - pad);
      candidate = { left:x, top:y, right:x + bw, bottom:y + bh };
      tries++;
    } while(rectsOverlap(candidate, yesRect, 16) && tries < 18);

    noBtn.style.left = x + 'px';
    noBtn.style.top  = y + 'px';

    question.textContent = pleas[pIndex % pleas.length];
    pIndex++;
    yesScale = Math.min(1.28, yesScale + 0.045);
    yesBtn.style.transform = 'scale(' + yesScale + ')';
    var noScale = Math.max(0.74, 1 - pIndex * 0.04);
    noBtn.style.transform = 'scale(' + noScale + ')';
  }

  // Desktop: flee on hover / proximity, and neutralise any click
  noBtn.addEventListener('mouseenter', moveNo);
  noBtn.addEventListener('mousedown', function(e){ e.preventDefault(); moveNo(); });
  document.addEventListener('mousemove', function(e){
    var r = noBtn.getBoundingClientRect();
    var dx = e.clientX - (r.left + r.width/2);
    var dy = e.clientY - (r.top + r.height/2);
    if(Math.sqrt(dx*dx + dy*dy) < 115) moveNo();
  });

  // Touch: the tap itself makes it flee before the click can land
  noBtn.addEventListener('touchstart', function(e){ e.preventDefault(); moveNo(); }, {passive:false});
  document.addEventListener('touchmove', function(e){
    var t = e.touches[0];
    if(!t) return;
    var r = noBtn.getBoundingClientRect();
    var dx = t.clientX - (r.left + r.width/2);
    var dy = t.clientY - (r.top + r.height/2);
    if(Math.sqrt(dx*dx + dy*dy) < 95) moveNo();
  }, {passive:true});

  // Safety net: even a click that lands does nothing but flee
  noBtn.addEventListener('click', function(e){ e.preventDefault(); e.stopPropagation(); moveNo(); });

  window.addEventListener('resize', function(){
    if(!dodged) return;
    var pad = 12;
    var bw = noBtn.offsetWidth, bh = noBtn.offsetHeight;
    var x = Math.min(parseFloat(noBtn.style.left)||pad, window.innerWidth  - bw - pad);
    var y = Math.min(parseFloat(noBtn.style.top)||pad,  window.innerHeight - bh - pad);
    noBtn.style.left = Math.max(pad, x) + 'px';
    noBtn.style.top  = Math.max(pad, y) + 'px';
  });

  function accept(){
    if(noBtn.parentNode) noBtn.parentNode.removeChild(noBtn);
    ask.classList.add('hide');
    thanks.classList.add('show');
    confetti();
  }
  yesBtn.addEventListener('click', accept);

  function confetti(){
    var colors = ['#5A48F5', '#C7F94D', '#FF6B5A', '#FFC24B', '#46D5E0', '#8A5CFF'];
    var count = reduce ? 16 : 42;
    var cx = window.innerWidth / 2;
    var cy = window.innerHeight / 2;

    for(var i=0;i<count;i++){
      var c = document.createElement('div');
      c.className = 'confetti';
      var w = 8 + Math.random()*7;
      c.style.width = w + 'px';
      c.style.height = (w + 3) + 'px';
      c.style.background = colors[i % colors.length];
      c.style.left = cx + 'px';
      c.style.top = cy + 'px';
      document.body.appendChild(c);

      var spread = (Math.random() - 0.5) * window.innerWidth * 1.1;
      var peak = -(140 + Math.random()*220);
      var fall = window.innerHeight * 0.7 + Math.random()*260;
      var rot = (Math.random()*900 - 450);
      var dur = 1600 + Math.random()*1400;

      var frames = reduce
        ? [ { transform:'translate(0,0)', opacity:1 },
            { transform:'translate(' + (spread*0.3) + 'px,' + (-90 - Math.random()*80) + 'px)', opacity:0 } ]
        : [ { transform:'translate(0,0) rotate(0deg)', opacity:1, offset:0 },
            { transform:'translate(' + (spread*0.55) + 'px,' + peak + 'px) rotate(' + (rot*0.4) + 'deg)', opacity:1, offset:0.35 },
            { transform:'translate(' + spread + 'px,' + fall + 'px) rotate(' + rot + 'deg)', opacity:0, offset:1 } ];

      var anim = c.animate(frames, { duration:dur, delay:Math.random()*160, easing:'cubic-bezier(.25,.5,.35,1)', fill:'forwards' });
      anim.onfinish = (function(node){ return function(){ if(node.parentNode) node.parentNode.removeChild(node); }; })(c);
    }
  }
})();
</script>
</body>
</html>
