<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Karla:wght@400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #efe9dc;
    font-family: 'Karla', sans-serif;
    color: #2e2a25;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .note {
    background: #fdf9f0;
    max-width: 460px;
    width: 100%;
    padding: 48px 40px;
    border-radius: 6px;
    box-shadow: 0 12px 40px rgba(60, 45, 25, 0.18);
    transform: rotate(-0.6deg);
    text-align: center;
  }
  h1 {
    font-family: 'Caveat', cursive;
    font-size: clamp(2.6rem, 8vw, 3.2rem);
    color: #b0543f;
    margin-bottom: 20px;
  }
  p {
    font-size: 1.05rem;
    line-height: 1.75;
    margin-bottom: 14px;
  }
</style>
</head>
<body>
  <div class="note">
    <h1>I'm sorry.</h1>
    <p>I know our first meeting didn't go well, and I'm not great at texting either.</p>
    <p>That's all — I just wanted to say sorry.</p>
  </div>
</body>
</html>
